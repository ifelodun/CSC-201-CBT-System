<!DOCTYPE html>
<html>
<head>
<title>CSC 201 CBT Exam</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body.dark {
    background-color: #121212;
    color: white;
}

.card.dark {
    background-color: #1e1e1e;
}

.palette {
    position: fixed;
    right: 10px;
    top: 120px;
    width: 200px;
}

.palette button {
    width: 45px;
    margin: 3px;
}

.answered {
    background-color: green !important;
    color: white;
}

.current {
    background-color: orange !important;
    color: white;
}
</style>

</head>

<body id="body">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">CSC 201 CBT</span>

    <div>
      <span id="timer" class="me-3">Time: 120</span>
      <button onclick="toggleDark()" class="btn btn-secondary btn-sm">🌙</button>
    </div>
  </div>
</nav>

<!-- PROGRESS BAR -->
<div class="progress">
  <div id="progressBar" class="progress-bar bg-success" style="width:0%">0%</div>
</div>

<div class="container mt-4">

<form method="POST" action="/review" id="examForm">

{% for q in questions %}
<div class="card mb-4 question" id="q{{ loop.index }}">
  <div class="card-body">
    <h5>{{ loop.index }}. {{ q.question }}</h5>

    {% for opt in [q.opt1, q.opt2, q.opt3, q.opt4] %}
    <div class="form-check">
      <input class="form-check-input"
             type="radio"
             name="{{ q.id }}"
             value="{{ opt }}"
             onchange="saveAnswer({{ q.id }}, '{{ opt }}', {{ loop.parent.index }})">
      <label class="form-check-label">{{ opt }}</label>
    </div>
    {% endfor %}

  </div>
</div>
{% endfor %}

<button class="btn btn-success w-100">Proceed to Review</button>

</form>

</div>

<!-- QUESTION PALETTE -->
<div class="palette bg-light p-2 shadow rounded" id="palette">
<h6>Questions</h6>

{% for q in questions %}
<button id="p{{ loop.index }}"
        class="btn btn-outline-primary btn-sm"
        onclick="goTo({{ loop.index }})">
  {{ loop.index }}
</button>
{% endfor %}
</div>

<script>
// ⏱️ TIMER
let time = 120;

setInterval(() => {
    time--;
    document.getElementById("timer").innerHTML = "Time: " + time;

    if(time <= 0){
        document.getElementById("examForm").submit();
    }
}, 1000);


// 🔢 GO TO QUESTION
function goTo(num){
    document.getElementById("q"+num).scrollIntoView();
    setCurrent(num);
}


// 🟡 CURRENT
function setCurrent(num){
    document.querySelectorAll(".palette button").forEach(btn=>{
        btn.classList.remove("current");
    });

    document.getElementById("p"+num).classList.add("current");
}


// 💾 SAVE ANSWER
function saveAnswer(qid, value, index){
    localStorage.setItem("q"+qid, value);

    document.getElementById("p"+index).classList.add("answered");

    updateProgress();
}


// 🔄 RESTORE
window.onload = function(){
    let total = {{ questions|length }};
    let answered = 0;

    {% for q in questions %}
    let saved = localStorage.getItem("q{{ q.id }}");

    if(saved){
        let radios = document.getElementsByName("{{ q.id }}");
        radios.forEach(r=>{
            if(r.value === saved){
                r.checked = true;
            }
        });

        document.getElementById("p{{ loop.index }}").classList.add("answered");
        answered++;
    }
    {% endfor %}

    updateProgress();
};


// 📊 PROGRESS
function updateProgress(){
    let total = {{ questions|length }};
    let answered = document.querySelectorAll(".answered").length;

    let percent = Math.round((answered/total)*100);

    let bar = document.getElementById("progressBar");
    bar.style.width = percent + "%";
    bar.innerHTML = percent + "%";
}


// 🌙 DARK MODE
function toggleDark(){
    document.body.classList.toggle("dark");

    document.querySelectorAll(".card").forEach(c=>{
        c.classList.toggle("dark");
    });
}


// 🚫 ANTI-CHEAT
document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        alert("⚠️ Do not switch tabs!");
    }
});

document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e) {
    if (e.ctrlKey || e.key === "F12") {
        e.preventDefault();
        alert("⚠️ Action blocked!");
    }
});
</script>

</body>
</html>
